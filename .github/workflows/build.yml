name: Build and Release Auto-Passport Crop

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4 # Updated to fix the deprecation warning

      - name: Install Node.js
        uses: actions/setup-node@v4 # Updated to fix the deprecation warning
        with:
          node-version: 25

      - name: Install Dependencies
        run: npm install

      - name: Build Vite Renderer
        run: npm run build

      - name: Build and Publish Electron App
        run: npx electron-builder --win --publish always # Using native electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}