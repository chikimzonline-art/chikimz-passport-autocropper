appId: com.autopassportcrop.app
productName: Auto-Passport-Crop
directories:
  output: dist/electron
  buildResources: resources
files:
  - src/main/**/*
  - dist/renderer/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: public/wasm
    to: wasm
    filter:
      - "**/*"
  - from: public/models
    to: models
    filter:
      - "**/*"
win:
  target: nsis
  icon: resources/icon.png
mac:
  target: dmg
  icon: resources/icon.png
linux:
  target: AppImage
  icon: resources/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
